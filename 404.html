<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Landolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --gold: #D4AF37; --black: #0A0A0A; --dark: #1A1A1A; --gray: #888; --white: #FAFAFA; }
        body { font-family: 'Inter', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; }
        header { padding: 24px 0; border-bottom: 1px solid rgba(212,175,55,0.2); }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--gold); text-decoration: none; }
        nav { display: flex; gap: 24px; }
        nav a { color: var(--gray); text-decoration: none; font-weight: 500; transition: color 0.2s; }
        nav a:hover { color: var(--gold); }
        main { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 80px 24px; }
        .error-code { font-size: 8rem; font-weight: 800; color: var(--gold); opacity: 0.3; line-height: 1; margin-bottom: 16px; }
        h1 { font-size: 2rem; font-weight: 700; margin-bottom: 16px; }
        p { color: var(--gray); font-size: 1.1rem; margin-bottom: 32px; max-width: 500px; margin-left: auto; margin-right: auto; }
        .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        .links a { color: var(--gold); text-decoration: none; font-weight: 600; padding: 12px 24px; border: 2px solid var(--gold); border-radius: 8px; transition: all 0.2s; }
        .links a:hover { background: var(--gold); color: var(--black); }
        .links a.primary { background: var(--gold); color: var(--black); }
        .links a.primary:hover { background: #B8962E; }
        footer { padding: 48px 0; border-top: 1px solid rgba(212,175,55,0.1); text-align: center; color: var(--gray); font-size: 0.875rem; }
        footer a { color: var(--gold); text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <div class="container header-inner">
            <a href="/" class="logo">Landolio</a>
            <nav>
                <a href="/tools/">Free Tools</a>
                <a href="/blog/">Blog</a>
            </nav>
        </div>
    </header>
    <main>
        <div>
            <div class="error-code">404</div>
            <h1>Page not found</h1>
            <p>The page you're looking for doesn't exist or has been moved. Try one of these instead:</p>
            <div class="links">
                <a href="/" class="primary">Homepage</a>
                <a href="/tools/">Free Tools</a>
                <a href="/blog/">Blog</a>
            </div>
        </div>
    </main>
    <footer>
        <div class="container">
            <p>© 2026 Landolio. Built by Midas 👑</p>
        </div>
    </footer>
</body>
</html>
